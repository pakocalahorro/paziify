name: Paziify Zero Defects - Aduana de Control

on:
  push:
    branches: [ main, development, 'setup/**' ]
  pull_request:
    branches: [ main ]

jobs:
  test-logic:
    name: 🧠 Validación del Cerebro (Lógica)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Instalación de Dependencias
        run: npm install --legacy-peer-deps

      - name: Ejecutar Tests de Lógica 🛡️
        run: npx jest src/__tests__/contentService.test.ts --config jest.config.logic.js --no-cache

  test-app-build:
    name: 🏗️ Build Check App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - name: Instalación de Dependencias
        run: npm install --legacy-peer-deps
      - name: Type Check App ʦ
        run: npx tsc --noEmit --project tsconfig.json
      - name: Build Check App 🏗️
        run: npx expo export --platform web --non-interactive

  test-admin:
    name: 🖥️ Validación del Panel Admin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json

      - name: Instalación de Dependencias Admin
        working-directory: ./admin
        run: npm install --legacy-peer-deps

      - name: Build Check Admin 🏗️
        working-directory: ./admin
        run: npm run build
